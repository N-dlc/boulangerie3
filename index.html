<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BOULANGERIE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="retour" onclick="retour()" style="display:none;">← Retour</button>

<h1>BOULANGERIE</h1>

<div id="menu-principal" class="center">
    <button onclick="afficherCategorie('pain')">Pain</button>
    <button onclick="afficherCategorie('patisserie')">Pâtisserie</button>
    <button onclick="afficherCategorie('boisson')">Boisson</button>
</div>

<div id="contenu" class="center"></div>

<footer>
    <p>contact@boulangerie.fr</p>
    <p>06 12 34 56 78</p>
</footer>

<script>
function afficherCategorie(categorie) {
    document.getElementById("menu-principal").style.display = "none";
    document.getElementById("retour").style.display = "block";

    let contenu = document.getElementById("contenu");

    if (categorie === "pain") {
        contenu.innerHTML = `
            <div class="produit" onclick="reserver('Baguette')">
                <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
                <p>Baguette</p>
            </div>
            <div class="produit" onclick="reserver('Pain complet')">
                <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
                <p>Pain complet</p>
            </div>
            <div class="produit" onclick="reserver('Pain aux graines')">
                <img src="https://images.unsplash.com/photo-1549931319-a545dcf3bc73">
                <p>Pain aux graines</p>
            </div>
        `;
    }

    if (categorie === "patisserie") {
        contenu.innerHTML = `
            <div class="produit" onclick="reserver('Tarte fraise')">
                <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187">
                <p>Tarte aux fraises</p>
            </div>
            <div class="produit" onclick="reserver('Tarte chocolat')">
                <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
                <p>Tarte au chocolat</p>
            </div>
            <div class="produit" onclick="reserver('Cookies')">
                <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e">
                <p>Cookies</p>
            </div>
        `;
    }

    if (categorie === "boisson") {
        contenu.innerHTML = `
            <div class="produit" onclick="reserver('Coca')">
                <img src="https://images.unsplash.com/photo-1581091870622-6c6b9b0b8f8f">
                <p>Coca</p>
            </div>
            <div class="produit" onclick="reserver('Café')">
                <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
                <p>Café</p>
            </div>
            <div class="produit" onclick="reserver('Thé')">
                <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
                <p>Thé</p>
            </div>
        `;
    }
}

function reserver(produit) {
    let contenu = document.getElementById("contenu");

    contenu.innerHTML = `
        <h2>Réserver : ${produit}</h2>

        <input type="date">

        <div class="horaires">
            <button onclick="valider()">7h - 11h</button>
            <button onclick="valider()">11h - 15h</button>
            <button onclick="valider()">15h - 19h</button>
        </div>
    `;
}

function valider() {
    alert("Réservation envoyée !");
    retour();
}

function retour() {
    document.getElementById("menu-principal").style.display = "flex";
    document.getElementById("contenu").innerHTML = "";
    document.getElementById("retour").style.display = "none";
}
</script>

</body>
</html>
